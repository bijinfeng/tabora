services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tabora_directus
      POSTGRES_USER: tabora
      POSTGRES_PASSWORD: tabora
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  directus:
    image: directus/directus:12.1.1
    env_file:
      - ../../backend/directus/.env.example
    volumes:
      - ../../backend/directus:/workspace/backend/directus:ro
      - ../../backend/directus/extensions:/directus/extensions:ro
    ports:
      - "8055:8055"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    image: directus/directus:12.1.1
    env_file:
      - ../../backend/directus/.env.example
    volumes:
      - ../../backend/directus:/workspace/backend/directus:ro
      - ../../backend/directus/extensions:/directus/extensions:ro
    depends_on:
      - postgres
      - redis
      - minio
    command: sh -c "node /directus/cli.js bootstrap && node /directus/cli.js start"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - directus
