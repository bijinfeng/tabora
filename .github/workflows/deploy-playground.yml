name: Deploy Playground

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-playground.yml"
      - "apps/playground/**"
      - "packages/**"
      - "plugins/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vite.config.ts"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-playground-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PLAYGROUND_DEPLOY_HOST: ${{ secrets.PLAYGROUND_DEPLOY_HOST }}
      PLAYGROUND_DEPLOY_PORT: ${{ secrets.PLAYGROUND_DEPLOY_PORT }}
      PLAYGROUND_DEPLOY_USER: ${{ secrets.PLAYGROUND_DEPLOY_USER }}
      PLAYGROUND_DEPLOY_PATH: ${{ secrets.PLAYGROUND_DEPLOY_PATH }}
      PLAYGROUND_DEPLOY_POST_COMMAND: ${{ secrets.PLAYGROUND_DEPLOY_POST_COMMAND }}
      PLAYGROUND_DEPLOY_PASSWORD: ${{ secrets.PLAYGROUND_DEPLOY_PASSWORD }}
      PLAYGROUND_DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.PLAYGROUND_DEPLOY_SSH_KNOWN_HOSTS }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regression summary
        run: pnpm regression:summary

      - name: Build playground
        run: pnpm --filter @tabora/playground build

      - name: Validate deploy configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          for name in PLAYGROUND_DEPLOY_HOST PLAYGROUND_DEPLOY_USER PLAYGROUND_DEPLOY_PATH PLAYGROUND_DEPLOY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing configuration::$name is not configured"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install SSH password helper
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Configure SSH known hosts
        shell: bash
        run: |
          set -euo pipefail
          deploy_port="${PLAYGROUND_DEPLOY_PORT:-22}"

          install -m 700 -d ~/.ssh

          if [ -n "${PLAYGROUND_DEPLOY_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$PLAYGROUND_DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$deploy_port" -H "$PLAYGROUND_DEPLOY_HOST" > ~/.ssh/known_hosts
          fi

          chmod 600 ~/.ssh/known_hosts

      - name: Ensure target directory exists
        shell: bash
        run: |
          set -euo pipefail
          deploy_port="${PLAYGROUND_DEPLOY_PORT:-22}"
          export SSHPASS="$PLAYGROUND_DEPLOY_PASSWORD"
          sshpass -e ssh -p "$deploy_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no "$PLAYGROUND_DEPLOY_USER@$PLAYGROUND_DEPLOY_HOST" "mkdir -p \"$PLAYGROUND_DEPLOY_PATH\""

      - name: Sync static files
        shell: bash
        run: |
          set -euo pipefail
          deploy_port="${PLAYGROUND_DEPLOY_PORT:-22}"
          export SSHPASS="$PLAYGROUND_DEPLOY_PASSWORD"
          sshpass -e rsync -az --delete -e "ssh -p $deploy_port -o PreferredAuthentications=password -o PubkeyAuthentication=no" apps/playground/dist/ "$PLAYGROUND_DEPLOY_USER@$PLAYGROUND_DEPLOY_HOST:$PLAYGROUND_DEPLOY_PATH/"

      - name: Run post-deploy command
        if: ${{ env.PLAYGROUND_DEPLOY_POST_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          deploy_port="${PLAYGROUND_DEPLOY_PORT:-22}"
          export SSHPASS="$PLAYGROUND_DEPLOY_PASSWORD"
          sshpass -e ssh -p "$deploy_port" -o PreferredAuthentications=password -o PubkeyAuthentication=no "$PLAYGROUND_DEPLOY_USER@$PLAYGROUND_DEPLOY_HOST" "$PLAYGROUND_DEPLOY_POST_COMMAND"
