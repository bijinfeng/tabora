packages:
  - apps/*
  - packages/*
  - plugins/*
  - plugins/*/*
  - backend/directus
  - backend/directus/extensions/*
  - tooling/*

allowBuilds:
  argon2: true
  braintrust: true
  esbuild: true
  isolated-vm: true
  oracledb: true
  protobufjs: true
  sharp: true
  spawn-sync: true
  sqlite3: true
  vue-demi: true

catalogs:
  node:
    "@types/node": ^25.9.1
  build:
    "@babel/plugin-syntax-jsx": ^7.29.7
    "@babel/plugin-syntax-typescript": ^7.29.7
    "@babel/plugin-transform-typescript": ^7.29.7
    "@stylexjs/cli": ^0.19.0
    "@stylexjs/unplugin": ^0.19.0
    babel-preset-solid: ^1.9.12
    tsdown: ^0.22.0
    typescript: ^6.0.3
    vite: ^8.0.14
    vite-plugin-solid: ^2.11.12
    vite-plus: ^0.1.22
  style:
    "@stylexjs/stylex": ^0.19.0
  data:
    dexie: ^4.4.2
    zod: ^4.4.3
  ai:
    ai: ^7.0.22
  test:
    "@vitest/browser-playwright": ^4.1.7
    fake-indexeddb: ^6.2.5
    happy-dom: ^20.9.0
    playwright: ^1.60.0
    vitest: ^4.1.7
  ui:
    "@kobalte/core": ^0.13.11
    "@solid-primitives/event-bus": ^1.1.3
    "@solid-primitives/media": ^2.3.5
    "@solid-primitives/timer": ^1.4.4
    "@solidjs/router": ^0.16.1
    lucide-solid: ^1.16.0
    solid-js: ^1.9.13
  toolkit:
    es-toolkit: ^1.47.0
