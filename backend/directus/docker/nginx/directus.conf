# Directus 生产配置（支持 HTTP/2、gzip、安全头）
# 使用方法：在 compose.prod.yml 里挂载此文件替换 default.conf

# HTTP → HTTPS 重定向（如果启用 HTTPS）
# server {
#   listen 80;
#   server_name your-domain.com;
#   return 301 https://$host$request_uri;
# }

# HTTPS 配置（需要证书）
# server {
#   listen 443 ssl http2;
#   server_name your-domain.com;
#
#   ssl_certificate /etc/nginx/ssl/fullchain.pem;
#   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
#   ssl_protocols TLSv1.2 TLSv1.3;
#   ssl_ciphers HIGH:!aNULL:!MD5;
#
#   # 其他配置同下
# }

# HTTP 配置（开发/无证书时使用）
server {
  listen 80;
  server_name _;  # 改为你的域名，如 api.tabora.com
  client_max_body_size 100M;

  # Gzip 压缩
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 256;

  # 安全头
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;

  location / {
    proxy_pass http://directus:8055;
    proxy_http_version 1.1;

    # 代理头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket 支持（Directus 实时订阅）
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 超时
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # 健康检查端点
  location /server/ping {
    proxy_pass http://directus:8055/server/ping;
    access_log off;
  }
}
