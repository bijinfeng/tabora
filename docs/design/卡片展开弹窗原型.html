<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabora · 卡片展开弹窗独立原型</title>
    <style>
      :root {
        --wb-page: #f6f7f4;
        --wb-surface: #ffffff;
        --wb-surface-soft: #fafaf8;
        --wb-surface-hover: #f2f4f0;
        --wb-text: #1c1e1c;
        --wb-text-muted: #6b6e6a;
        --wb-text-subtle: #949792;
        --wb-line: #e6e8e3;
        --wb-line-strong: #d1d4ce;
        --wb-accent: #1a9070;
        --wb-accent-soft: #eaf5f0;
        --wb-shadow-floating: rgba(0, 0, 0, 0.15);
        --wb-focus-ring: rgba(26, 144, 112, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        background:
          linear-gradient(rgba(28, 30, 28, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(28, 30, 28, 0.04) 1px, transparent 1px), var(--wb-page);
        background-size: 24px 24px;
        color: var(--wb-text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "PingFang SC",
          "Microsoft YaHei",
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      button,
      input {
        font: inherit;
      }

      .prototype-stage {
        width: min(100%, 1240px);
        min-height: min(720px, calc(100vh - 64px));
        display: grid;
        align-items: center;
      }

      .size-stage {
        width: min(100%, 760px);
        margin: 0 auto;
        min-width: 0;
        display: grid;
        gap: 10px;
      }

      .size-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 0 2px;
        color: var(--wb-text-muted);
        font-size: 11px;
        line-height: 1.2;
      }

      .size-label {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .size-label strong {
        color: var(--wb-text);
        font-size: 12px;
        font-weight: 650;
      }

      .size-toggle {
        height: 28px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 0 10px;
        border: 1px solid var(--wb-line);
        border-radius: 7px;
        background: var(--wb-surface);
        color: var(--wb-text);
        font-size: 11px;
        font-weight: 600;
        cursor: default;
      }

      .size-toggle::after {
        content: "";
        width: 6px;
        height: 6px;
        border-right: 1.5px solid currentColor;
        border-bottom: 1.5px solid currentColor;
        transform: rotate(45deg) translateY(-1px);
        opacity: 0.55;
      }

      .size-toggle:hover {
        border-color: var(--wb-line-strong);
        background: var(--wb-surface-hover);
      }

      .expand-modal {
        width: 100%;
        max-height: min(720px, calc(100vh - 104px));
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--wb-line);
        border-radius: 12px;
        background: var(--wb-surface);
        box-shadow: 0 14px 36px color-mix(in srgb, var(--wb-shadow-floating) 72%, transparent);
      }

      .expand-modal.size-sm {
        width: 520px;
        min-height: 320px;
      }

      .expand-modal.size-md {
        width: 640px;
        min-height: 380px;
      }

      .expand-modal.size-lg {
        width: 760px;
        min-height: 440px;
      }

      .expand-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--wb-line);
        background: color-mix(in srgb, var(--wb-surface-soft) 72%, var(--wb-surface));
      }

      .expand-title {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .expand-title-icon {
        width: 24px;
        height: 24px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border-radius: 6px;
        background: var(--wb-accent-soft);
        color: var(--wb-accent);
        font-size: 12px;
        font-weight: 700;
      }

      .expand-title-main {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .expand-title-main strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
        line-height: 1.25;
        font-weight: 650;
      }

      .expand-title-kicker {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--wb-text-subtle);
        font-size: 10px;
        line-height: 1.2;
        font-weight: 500;
      }

      .icon-button {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--wb-text-muted);
        cursor: default;
      }

      .icon-button::before,
      .icon-button::after {
        content: "";
        position: absolute;
        width: 11px;
        height: 1.5px;
        border-radius: 999px;
        background: currentColor;
      }

      .icon-button {
        position: relative;
      }

      .icon-button::before {
        transform: rotate(45deg);
      }

      .icon-button::after {
        transform: rotate(-45deg);
      }

      .icon-button:hover {
        background: var(--wb-surface-hover);
        color: var(--wb-text);
      }

      .expand-body {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 12px;
        background: var(--wb-surface);
      }

      .content-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 20px;
        padding: 0 2px 8px;
        color: var(--wb-text-muted);
        font-size: 11px;
      }

      .content-head span:last-child {
        color: var(--wb-text-subtle);
      }

      .focus-input {
        width: 100%;
        height: 36px;
        padding: 0 10px;
        border: 1px solid var(--wb-line);
        border-radius: 8px;
        outline: none;
        background: var(--wb-surface);
        color: var(--wb-text);
        font-size: 14px;
        font-weight: 550;
      }

      .focus-input:focus {
        border-color: var(--wb-accent);
        box-shadow: 0 0 0 2px var(--wb-focus-ring);
      }

      .focus-input::placeholder {
        color: var(--wb-text-subtle);
      }

      .helper-text {
        margin: 8px 2px 0;
        color: var(--wb-text-muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .size-sm .detail-grid {
        grid-template-columns: 1fr;
      }

      .size-sm .detail-cell:nth-child(3) {
        display: none;
      }

      .detail-cell {
        min-width: 0;
        padding: 8px;
        border: 1px solid var(--wb-line);
        border-radius: 8px;
        background: var(--wb-surface-soft);
      }

      .detail-label {
        color: var(--wb-text-subtle);
        font-size: 10px;
        line-height: 1.2;
      }

      .detail-value {
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--wb-text);
        font-size: 12px;
        font-weight: 600;
      }

      .expand-footer {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        padding: 8px 12px;
        border-top: 1px solid var(--wb-line);
        background: color-mix(in srgb, var(--wb-surface-soft) 78%, var(--wb-surface));
      }

      .close-hint {
        flex: 0 0 auto;
        color: var(--wb-text-subtle);
        font-size: 10px;
        white-space: nowrap;
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .prototype-stage {
          min-height: calc(100vh - 32px);
          border-radius: 12px;
        }

        .size-stage {
          width: 100%;
        }

        .expand-modal {
          width: 100% !important;
          min-height: 420px;
        }

        .detail-grid {
          grid-template-columns: 1fr;
        }

        .expand-footer {
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="prototype-stage" aria-label="卡片展开弹窗独立原型">
      <div class="size-stage" aria-label="卡片展开弹窗尺寸方案">
        <div class="size-toolbar">
          <div class="size-label">
            <strong id="sizeName">M</strong><span id="sizeSpec">640 × 380</span>
          </div>
          <button class="size-toggle" id="sizeToggle" type="button">切换尺寸</button>
        </div>

        <section class="expand-modal size-md" id="expandModal" data-od-id="card-expand-modal-md">
          <header class="expand-header">
            <div class="expand-title">
              <div class="expand-title-icon" aria-hidden="true">目</div>
              <div class="expand-title-main">
                <strong>今日目标</strong>
                <span class="expand-title-kicker">Focus Widget · focus-1</span>
              </div>
            </div>
            <button class="icon-button" type="button" aria-label="关闭"></button>
          </header>

          <div class="expand-body">
            <div class="content-head">
              <span>单行输入</span>
              <span>自动保存</span>
            </div>
            <input
              class="focus-input"
              value="把添加卡片流程收敛到一版可用交互"
              aria-label="今日目标"
            />
            <p class="helper-text" id="sizeDescription">
              中尺寸承载常规卡片内容，宽度优先给信息分区和操作区留空间，高度保持轻量。
            </p>

            <div class="detail-grid" aria-label="卡片实例信息">
              <div class="detail-cell">
                <div class="detail-label">状态</div>
                <div class="detail-value">正在使用</div>
              </div>
              <div class="detail-cell">
                <div class="detail-label">默认尺寸</div>
                <div class="detail-value" id="defaultSize">M · 2 列</div>
              </div>
              <div class="detail-cell">
                <div class="detail-label">来源</div>
                <div class="detail-value">官方插件</div>
              </div>
            </div>
          </div>

          <footer class="expand-footer">
            <span class="close-hint">esc 关闭 · enter 保存</span>
          </footer>
        </section>
      </div>
    </main>
    <script>
      const sizes = [
        {
          key: "sm",
          name: "S",
          spec: "520 × 320",
          defaultSize: "S · 1 列",
          description: "小尺寸适合轻量卡片详情，保持横向信息面板比例，只承载核心输入和必要状态。",
        },
        {
          key: "md",
          name: "M",
          spec: "640 × 380",
          defaultSize: "M · 2 列",
          description: "中尺寸承载常规卡片内容，宽度优先给信息分区和操作区留空间，高度保持轻量。",
        },
        {
          key: "lg",
          name: "L",
          spec: "760 × 440",
          defaultSize: "L · 3 列",
          description: "大尺寸用于信息更丰富的卡片，扩展横向承载能力，不把弹窗做成纵向页面。",
        },
      ]

      let sizeIndex = 1
      const expandModal = document.getElementById("expandModal")
      const sizeName = document.getElementById("sizeName")
      const sizeSpec = document.getElementById("sizeSpec")
      const sizeDescription = document.getElementById("sizeDescription")
      const defaultSize = document.getElementById("defaultSize")
      const sizeToggle = document.getElementById("sizeToggle")

      function applySize(nextSize) {
        expandModal.className = `expand-modal size-${nextSize.key}`
        expandModal.dataset.odId = `card-expand-modal-${nextSize.key}`
        sizeName.textContent = nextSize.name
        sizeSpec.textContent = nextSize.spec
        sizeDescription.textContent = nextSize.description
        defaultSize.textContent = nextSize.defaultSize
        sizeToggle.setAttribute("aria-label", `切换尺寸，当前为 ${nextSize.name}`)
      }

      sizeToggle.addEventListener("click", () => {
        sizeIndex = (sizeIndex + 1) % sizes.length
        applySize(sizes[sizeIndex])
      })
    </script>
  </body>
</html>
